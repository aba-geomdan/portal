<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>검단ABA 도구 모음</title>
<style>
  :root {
    --brand: #F0768B;
    --brand-dark: #D85A72;
    --brand-soft: #FFEDEE;
    --bg: #FFF6F4;
    --ink: #2C2326;
    --sub: #8A7A7E;
    --line: #F1DEDF;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    padding: 28px 18px 48px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }

  .head {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
  }
  .head img {
    width: 52px; height: 52px; border-radius: 13px; object-fit: contain;
    flex-shrink: 0;
  }
  .head .title { font-size: 21px; font-weight: 800; letter-spacing: -0.3px; }
  .head .subtitle { font-size: 13px; color: var(--sub); margin-top: 3px; }

  a.card { text-decoration: none; color: inherit; display: block; }

  .main-card {
    background: var(--white);
    border: 2px solid var(--brand);
    border-radius: 16px;
    padding: 20px 22px;
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 26px;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .main-card:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(240,118,139,.18); }
  .main-icon {
    width: 50px; height: 50px; border-radius: 13px;
    background: var(--brand-soft); color: var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .main-card .eyebrow { font-size: 12px; color: var(--brand-dark); font-weight: 700; margin-bottom: 3px; }
  .main-card .name { font-size: 17px; font-weight: 800; }
  .main-card .desc { font-size: 13px; color: var(--sub); margin-top: 2px; }
  .main-card .arrow { margin-left: auto; color: var(--brand); font-size: 22px; }

  .section-label {
    font-size: 13px; color: var(--sub); font-weight: 700;
    margin: 0 0 12px 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 14px;
  }
  .tool {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    height: 100%;
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .tool:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(240,118,139,.14);
    border-color: var(--brand);
  }
  .tool .ticon { font-size: 24px; }
  .tool .name { font-size: 15.5px; font-weight: 800; margin-top: 10px; }
  .tool .desc { font-size: 12.5px; color: var(--sub); margin-top: 3px; }

  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 32px 0 14px;
  }
  .divider .label { font-size: 12.5px; color: var(--sub); font-weight: 700; }
  .divider .rule { flex: 1; height: 1px; background: var(--line); }

  .admin-card {
    background: #FBF4F5;
    border: 1px dashed var(--brand);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 13px;
  }
  .admin-card:hover { background: var(--brand-soft); }
  .admin-card .aicon {
    width: 40px; height: 40px; border-radius: 11px;
    background: var(--white); color: var(--brand-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .admin-card .name { font-size: 15px; font-weight: 800; }
  .admin-card .desc { font-size: 12px; color: var(--sub); margin-top: 1px; }
  .admin-card .arrow { margin-left: auto; color: var(--brand); font-size: 18px; }

  .foot {
    text-align: center; margin-top: 38px;
    font-size: 11.5px; color: var(--sub); line-height: 1.7;
  }
  .foot .copy { color: var(--brand-dark); font-weight: 600; }

  /* emoji-as-icon fallback (no icon font dependency) */
  .emoji { font-style: normal; line-height: 1; }
</style>
</head>
